<!DOCTYPE html>
<html>
<body>
  <h2>Gamepad</h2>

  <button ontouchstart="press('left', true)" ontouchend="press('left', false)">⬅️</button>
  <button ontouchstart="press('right', true)" ontouchend="press('right', false)">➡️</button>
  <button ontouchstart="press('jump', true)" ontouchend="press('jump', false)">A</button>

  <script>
    const socket = new WebSocket("ws://10.56.2.4:3000");

    let input = {
      left: false,
      right: false,
      jump: false
    };

    function press(key, state) {
      input[key] = state;

      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: "input",
          input
        }));
      }
    }
  </script>
</body>
</html>
